alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

server:
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

extraScrapeConfigs: |
  - job_name: gateway
    static_configs:
      - targets:
          - gateway.default.svc.cluster.local:8000
    metrics_path: /metrics

  - job_name: webhook
    static_configs:
      - targets:
          - webhook.default.svc.cluster.local:8001
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets:
          - orchestrator.default.svc.cluster.local:8002
    metrics_path: /metrics

  - job_name: reviewer
    static_configs:
      - targets:
          - reviewer.default.svc.cluster.local:8003
    metrics_path: /metrics

  - job_name: learner
    static_configs:
      - targets:
          - learner.default.svc.cluster.local:8004
    metrics_path: /metrics
