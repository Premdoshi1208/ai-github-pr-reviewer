name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "604175033417"
  AWS_ROLE_ARN: arn:aws:iam::604175033417:role/github-actions-ai-reviewer

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: gateway
            context: services/gateway
            dockerfile: services/gateway/Dockerfile
            repo: gateway

          - name: webhook
            context: services/webhook
            dockerfile: services/webhook/Dockerfile
            repo: webhook

          - name: orchestrator
            context: services/orchestrator
            dockerfile: services/orchestrator/Dockerfile
            repo: orchestrator

          - name: reviewer
            context: services/reviewer
            dockerfile: services/reviewer/Dockerfile
            repo: reviewer

          - name: learner
            context: services/learner
            dockerfile: services/learner/Dockerfile
            repo: learner

          - name: evaluate
            context: scripts
            dockerfile: scripts/Dockerfile
            repo: evaluate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ matrix.repo }}

          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}
