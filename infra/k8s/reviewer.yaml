apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reviewer
  template:
    metadata:
      labels:
        app: reviewer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: reviewer
          image: 604175033417.dkr.ecr.us-east-1.amazonaws.com/reviewer:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: reviewer
spec:
  selector:
    app: reviewer
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
